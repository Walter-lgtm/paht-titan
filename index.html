<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PAHT TITAN | Теплообменные аппараты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏛️ ПАХТ ТИТАН: Инженерный Модуль</h1>
        <p>Расчет парового подогревателя сырья (Бензол-Толуол)</p>
    </header>

    <main id="app">
        <section class="input-panel">
            <h2>1. Исходные данные</h2>
            <div class="form-group">
                <label>Состав (Бензол/Толуол), % масс:</label>
                <input type="number" id="mass_benzene" value="50">
            </div>
            <div class="form-group">
                <label>Расход сырья G2, кг/час:</label>
                <input type="number" id="g2_flow" value="18000">
            </div>
            <div class="form-group">
                <label>Давление сырья P2, МПа:</label>
                <input type="number" id="p2_press" value="0.11" step="0.01">
            </div>
            <button onclick="calculateFirstSteps()">Запустить расчет</button>
        </section>

        <section class="results-panel">
            <h2>2. Результаты (Шаги 1-3)</h2>
            <div id="output">Здесь появятся результаты...</div>
        </section>
    </main>

    <script src="js/engine.js"></script>
</body>
</html>
